groups:
  - name: k8scope.critical
    rules:
      - alert: KubeNodeNotReady
        expr: kube_node_status_condition{condition="Ready",status="true"} == 0
        for: 5m
        labels:
          severity: critical
          k8scope: "true"
        annotations:
          summary: "Node {{ $labels.node }} is not ready"
          description: "Node {{ $labels.node }} has been in NotReady state for more than 5 minutes."
          runbook_url: "https://github.com/y0s3ph/k8scope/blob/main/docs/runbooks/KubeNodeNotReady.md"

      - alert: KubePodCrashLooping
        expr: increase(kube_pod_container_status_restarts_total[15m]) > 5
        for: 0m
        labels:
          severity: critical
          k8scope: "true"
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
          description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value | humanize }} times in the last 15 minutes."
          runbook_url: "https://github.com/y0s3ph/k8scope/blob/main/docs/runbooks/KubePodCrashLooping.md"

      - alert: KubePVCFillingUp
        expr: |
          (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.9
          and predict_linear(kubelet_volume_stats_used_bytes[6h], 4 * 3600) > kubelet_volume_stats_capacity_bytes
        for: 5m
        labels:
          severity: critical
          k8scope: "true"
        annotations:
          summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is filling up"
          description: "PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} is over 90% full and predicted to fill completely within 4 hours."
          runbook_url: "https://github.com/y0s3ph/k8scope/blob/main/docs/runbooks/KubePVCFillingUp.md"

      - alert: PrometheusDown
        expr: up{job=~".*prometheus.*"} == 0
        for: 3m
        labels:
          severity: critical
          k8scope: "true"
        annotations:
          summary: "Prometheus target {{ $labels.instance }} is down"
          description: "Prometheus target {{ $labels.job }}/{{ $labels.instance }} has been down for more than 3 minutes."
          runbook_url: "https://github.com/y0s3ph/k8scope/blob/main/docs/runbooks/PrometheusDown.md"

      - alert: ClusterCPUOvercommit
        expr: |
          sum(kube_pod_container_resource_requests{resource="cpu"})
          / sum(kube_node_status_allocatable{resource="cpu"}) > 0.9
        for: 10m
        labels:
          severity: critical
          k8scope: "true"
        annotations:
          summary: "Cluster CPU requests exceed 90% of allocatable"
          description: "Total CPU requests across all pods are at {{ $value | humanizePercentage }} of total allocatable CPU. New pods may fail to schedule."
          runbook_url: "https://github.com/y0s3ph/k8scope/blob/main/docs/runbooks/ClusterCPUOvercommit.md"

      - alert: ClusterMemoryOvercommit
        expr: |
          sum(kube_pod_container_resource_requests{resource="memory"})
          / sum(kube_node_status_allocatable{resource="memory"}) > 0.9
        for: 10m
        labels:
          severity: critical
          k8scope: "true"
        annotations:
          summary: "Cluster memory requests exceed 90% of allocatable"
          description: "Total memory requests across all pods are at {{ $value | humanizePercentage }} of total allocatable memory. New pods may fail to schedule."
          runbook_url: "https://github.com/y0s3ph/k8scope/blob/main/docs/runbooks/ClusterMemoryOvercommit.md"
