replicas: 1

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: true
  size: 5Gi

adminPassword: ""

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://k8scope-prom-prometheus.k8scope.svc:9090
        access: proxy
        isDefault: true
      - name: Loki
        type: loki
        url: http://k8scope-loki.k8scope.svc:3100
        access: proxy

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: k8scope
        folder: k8scope
        type: file
        disableDeletion: true
        options:
          path: /var/lib/grafana/dashboards/k8scope

sidecar:
  dashboards:
    enabled: true
    label: k8scope-dashboard
    folderAnnotation: grafana_folder
